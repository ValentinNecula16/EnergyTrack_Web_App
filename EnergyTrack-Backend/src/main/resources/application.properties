spring.application.name=energytrack-backend
server.port=8080

# === PostgreSQL Configuration ===
spring.datasource.url=jdbc:postgresql://localhost:5432/energytrackdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# VAPID keys for Web Push Notifications
# On first startup these are auto-generated and printed to console.
# Replace TO_BE_GENERATED with the printed values to keep them stable across restarts.
vapid.public.key=TO_BE_GENERATED
vapid.private.key=TO_BE_GENERATED